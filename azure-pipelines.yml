trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and Test
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: Use Node.js

    - script: |
        cd frontend
        npm install
        npm run build
        cd ../backend
        npm install
        npm run build
      displayName: Build frontend and backend

    - script: |
        cd frontend
        npm run test:coverage
        cd ../backend
        npm run test:coverage
      displayName: Run unit tests and generate coverage

    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/build-output/frontend
        mkdir -p $(Build.ArtifactStagingDirectory)/build-output/backend
        cp -R frontend/build $(Build.ArtifactStagingDirectory)/build-output/frontend/
        cp -R backend/src $(Build.ArtifactStagingDirectory)/build-output/backend/
        cp backend/package.json $(Build.ArtifactStagingDirectory)/build-output/backend/
      displayName: Prepare build output artifact

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/build-output'
        artifact: 'build-output'
      displayName: Publish build output artifact

- stage: Deliver
  displayName: Deliver Artifact
  dependsOn: Build
  jobs:
  - job: DeliverJob
    displayName: Deliver Job
    steps:
    - task: DownloadPipelineArtifact@2
      inputs:
        artifact: 'build-output'
        path: '$(Pipeline.Workspace)/build-output'
      displayName: Download build output artifact

    - script: |
        mkdir -p $(Build.ArtifactStagingDirectory)/release
        cp -R $(Pipeline.Workspace)/build-output/* $(Build.ArtifactStagingDirectory)/release/
      displayName: Prepare release artifact

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/release'
        ArtifactName: 'app-release'
        publishLocation: 'Container'
      displayName: Publish release artifact

- stage: Deploy_Dev
  displayName: Deploy to Dev
  dependsOn: Deliver
  jobs:
  - deployment: DeployDev
    displayName: Deploy to DEV Environment
    environment: DEV
    strategy:
      runOnce:
        deploy:
          steps:
          -download: none
          
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'app-release'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: Download artifact

          - script: |
              echo "Deploying artifact to DEV environment"
              ls -R $(System.ArtifactsDirectory)
              echo "Launching deployed app in DEV environment (mock)"
            displayName: Mock deploy and launch in DEV

- stage: Deploy_QAT
  displayName: Deploy to QAT
  dependsOn: Deploy_Dev
  jobs:
  - deployment: DeployQAT
    displayName: Deploy to QAT Environment
    environment: QAT
    strategy:
      runOnce:
        deploy:
          steps:
          -download: none
          
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'app-release'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: Download artifact

          - script: |
              echo "Deploying artifact to QAT environment"
              ls -R $(System.ArtifactsDirectory)
            displayName: Mock deploy to QAT

- stage: Deploy_Staging
  displayName: Deploy to Staging
  dependsOn: Deploy_QAT
  jobs:
  - deployment: DeployStaging
    displayName: Deploy to Staging Environment
    environment: Staging
    strategy:
      runOnce:
        deploy:
          steps:
          -download: none
          
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'app-release'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: Download artifact

          - script: |
              echo "Deploying artifact to Staging environment"
              ls -R $(System.ArtifactsDirectory)
            displayName: Mock deploy to Staging

- stage: Deploy_Production
  displayName: Deploy to Production
  dependsOn: Deploy_Staging
  jobs:
  - deployment: DeployProduction
    displayName: Deploy to Production Environment
    environment: Production
    strategy:
      runOnce:
        deploy:
          steps:
          -download: none
          
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'app-release'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: Download artifact

          - script: |
              echo "Deploying artifact to Production environment"
              ls -R $(System.ArtifactsDirectory)
            displayName: Mock deploy to Production
